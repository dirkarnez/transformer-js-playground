<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <a href="https://github.com/dirkarnez/transformer-js-playground" target="_blank">dirkarnez//transformer-js-playground</a><br>
  <div id="container"></div>
  <script>
    const div = document.getElementById("container");
    const log = (...data) => div.innerHTML += `${data.join(String.fromCharCode(0x20))}<br>`;
    const error = (...data) => div.innerHTML += `<span style="color: red">${data.join(String.fromCharCode(0x20))}<span><br>`;
    // log(1,2,3);
    // error(1,2,3);


    /**
     * 運用 JS 特性模擬的極簡 Transformer
     * - 並行性 (Parallelism): 使用 Promise.all 同時計算所有時間點的 Attention Weight
     * - 反應性 (Reactivity): 繼承 EventTarget，當新數據到達時自動觸發推理
     */
    class ReactiveCSITransformer extends EventTarget {
        constructor(numSubcarriers = 30, numPackets = 4) {
            super();
            this.numSubcarriers = numSubcarriers;
            this.numPackets = numPackets; // 時間序列長度 (Patches)
            
            // 模擬經由訓練優化後的固定權重 (簡化為隨機矩陣，實際應從 PyTorch 匯出)
            this.weights = {
                query: Array.from({ length: 8 }, () => Array(numSubcarriers * 2).fill(0.1)), // 簡化 d_model = 8
                key: Array.from({ length: 8 }, () => Array(numSubcarriers * 2).fill(0.12)),
                value: Array.from({ length: 8 }, () => Array(numSubcarriers * 2).fill(0.08)),
                envClassifier: Array(8).fill(0.5), // 室內/室外 分類權重
                losClassifier: Array(8).fill(-0.3) // LOS/NLOS 分類權重
            };
        }
    
        // 向量點積 (Dot Product) - 模擬神經網路底層計算
        dotProduct(vecA, vecB) {
            return vecA.reduce((sum, val, i) => sum + val * (vecB[i] || 0), 0);
        }
    
        // 軟極大化函數 (Softmax) - 將 Attention Scores 轉為動態權重 (總和為 1)
        /* 
        softmax(arr) {
            const exps = arr.map(x => Math.exp(x));
            const sumExps = exps.reduce((a, b) => a + b, 0);
            return exps.map(x => x / sumExps);
        }
        */
      // 安全的 軟極大化函數 (Safe Softmax) - 防止數值爆炸成 Infinity
      softmax(arr) {
          // 1. 找出陣列中的最大值
          const maxVal = Math.max(...arr);
          
          // 2. 每個人都減去最大值再做 exp，這樣最大也就是 exp(0) = 1，絕不溢位
          const exps = arr.map(x => Math.exp(x - maxVal));
          const sumExps = exps.reduce((a, b) => a + b, 0);
          
          return exps.map(x => x / sumExps);
      }

    
        /**
         * 階段一：模擬並行時間序列處理 (Parallel Time-Series Processing)
         * 使用 Promise.all 讓每個時間點 (Packet) 同時計算自己的 Q, K, V 向量
         */
        async extractKVAndQuery(sequence) {
            const promises = sequence.map(async (packetData, t) => {
                // packetData 包含 [30個振幅, 30個相位差] = 60 維向量
                const q = this.weights.query.map(w => this.dotProduct(packetData, w));
                const k = this.weights.key.map(w => this.dotProduct(packetData, w));
                const v = this.weights.value.map(w => this.dotProduct(packetData, w));
                return { t, q, k, v };
            });
            return Promise.all(promises); // 模擬硬體並行計算
        }
    
        /**
         * 階段二：核心動態權重機制 (Dynamic Weighting Mechanism)
         * 計算 Self-Attention 並輸出環境與信號狀態
         */
        async predict(sequence) {
            if (sequence.length !== this.numPackets) {
                throw new Error(`需要精確的 ${this.numPackets} 個時間點數據。`);
            }
    
            // 1. 並行提取特徵
            const tokens = await this.extractKVAndQuery(sequence);
    
            // 2. 動態權重計算 (Self-Attention)
            // 拿最後一個時間點 (最新狀態) 作為 Query，去跟所有歷史時間點 (Key) 比較
            // const latestToken = tokens[tokens.length - 1];
            // const attentionScores = tokens.map(token => this.dotProduct(latestToken.q, token.k));
            const latestToken = tokens[tokens.length - 1];
            const d_model = 8; // 特徵維度
            const scale = Math.sqrt(d_model); // 縮放因子
            
            const attentionScores = tokens.map(token => {
                // 將點積結果除以 scale，防止數值過大 (Scaled Dot-Product)
                return this.dotProduct(latestToken.q, token.k) / scale;
            });
                        
            // 3. 將分數轉為權重比例 (動態權重)
            const dynamicWeights = this.softmax(attentionScores);
    
            // 4. 加權聚合所有時間點的特徵 (Context Vector)
            const contextVector = Array(8).fill(0);
            tokens.forEach((token, idx) => {
                const w = dynamicWeights[idx];
                for (let i = 0; i < 8; i++) {
                    contextVector[i] += w * token.v[i];
                }
            });
    
            // 5. 分類器輸出頭 (Classifiers)
            const envScore = this.dotProduct(contextVector, this.weights.envClassifier);
            const losScore = this.dotProduct(contextVector, this.weights.losClassifier);
    
            return {
                dynamicWeights: dynamicWeights.map(w => w.toFixed(3)), // 秀出各時間點佔的權重
                environment: envScore > 0 ? "Indoor (室內)" : "Outdoor (室外)",
                signalState: losScore > 0 ? "NLOS (非直射)" : "LOS (直射)"
            };
        }
    
        /**
         * 階段三：事件驅動反應性 (Event-Driven Reactivity)
         * 監聽網卡或緩衝區事件，自動觸發推理並發布結果
         */
        initReactiveListener() {
            this.addEventListener('new_csi_window', async (event) => {
                const sequenceData = event.detail.sequence;
                try {
                    const result = await this.predict(sequenceData);
                    
                    // 觸發自訂結果事件，通知前端或下游控制系統
                    this.dispatchEvent(new CustomEvent('csi_inference_result', { detail: result }));
                } catch (err) {
                    console.error("即時推理失敗:", err.message);
                }
            });
        }
    }
    
    // =====================================================================
    // 2. 測試與展示腳本 (模擬 Moving STA 數據流)
    // =====================================================================
    
    // 初始化模型：30個子載波，時間窗口為 4 包 (40ms 延遲)
    const transformer = new ReactiveCSITransformer(30, 4);
    transformer.initReactiveListener();
    
    // 訂閱最終推理結果事件（反應式架構）
    transformer.addEventListener('csi_inference_result', (event) => {
        log("\n⚡ [反應式觸發] 收到最新即時推理結果:");
        log(`- 動態時間權重配比: [${event.detail.dynamicWeights.join(', ')}]`);
        log(`- 自適應環境判定: ${event.detail.environment}`);
        log(`- 通道狀態判定:   ${event.detail.signalState}`);
    });
    
    // 模擬生成一筆 CSI 資料包（30振幅 + 30相位差 = 60維）
    function generateMockPacket(amplitudeBias, phaseNoise) {
        const amplitudes = Array(30).fill(0).map(() => Math.random() * 10 + amplitudeBias);
        const phases = Array(30).fill(0).map(() => Math.random() * phaseNoise);
        return [...amplitudes, ...phases];
    }
    
    // 模擬即時滑動窗口緩衝區 (Sliding Window Buffer)
    let slidingWindowBuffer = [];
    
    log("🚀 即時 CSI 反應式系統啟動，等待數據流注入...");
    
    // 模擬每 50 毫秒網卡收到一個新數據包 (STA 移動中)
    let packetCount = 0;
    const intervalId = setInterval(() => {
        packetCount++;
        
        // 模擬在第 5 包時，STA 從室外走入室內且被障礙物阻擋 (高振幅波動, 高相位噪聲)
        const isIndoorNLOS = packetCount > 5;
        const mockPacket = isIndoorNLOS 
            ? generateMockPacket(25, 3.14)  // 室內強多徑，高相位不確定性 (NLOS)
            : generateMockPacket(5, 0.2);   // 室外開闊，穩定的相位 (LOS)
    
        slidingWindowBuffer.push(mockPacket);
    
        // 維持滑動窗口長度為 4
        if (slidingWindowBuffer.length > 4) {
            slidingWindowBuffer.shift();
        }
    
        // 當窗口填滿時，發布事件激活 Transformer 開始工作 (反應性展現)
        if (slidingWindowBuffer.length === 4) {
            log(`[數據流] 已收集到第 ${packetCount} 包，觸發並行推理...`);
            transformer.dispatchEvent(new CustomEvent('new_csi_window', {
                detail: { sequence: [...slidingWindowBuffer] }
            }));
        }
    
        if (packetCount === 8) {
            clearInterval(intervalId);
            log("\n測試結束。");
        }
    }, 50);
  </script>
</body>
</html>
